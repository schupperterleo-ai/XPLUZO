<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Connect</title>
    <style>
        body {
            background-color: #08080c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .server-card {
            background: #111116;
            border: 2px solid #00f2fe;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            max-width: 400px;
            width: 100%;
        }

        h2 {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
            margin-bottom: 5px;
        }

        .status {
            color: #00ff66;
            font-size: 0.9rem;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.4);
            margin-bottom: 25px;
        }

        /* Die klickbare IP-Box */
        .ip-box {
            background: #181824;
            border: 2px dashed #00f2fe;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00f2fe;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none; /* Text kann nicht versehentlich markiert werden */
        }

        /* Hover-Effekt */
        .ip-box:hover {
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
            transform: scale(1.02);
        }

        /* Klasse wird per JavaScript hinzugefügt, wenn kopiert wurde */
        .ip-box.copied {
            border-style: solid;
            border-color: #00ff66;
            color: #00ff66;
            box-shadow: 0 0 25px #00ff66;
        }

        .hint {
            font-size: 0.8rem;
            color: #5a5a75;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="server-card">
        <h2>LOAD_SMP</h2>
        <div class="status">● SERVER ONLINE</div>
        
        <!-- Wenn man hier draufklickt, wird die Funktion aufgerufen -->
        <div class="ip-box" id="ipBox" onclick="copyIP()">
            loadsmp.net
        </div>
        <div class="hint">Klicke auf die IP zum Kopieren!</div>
    </div>

    <script>
        function copyIP() {
            const ipText = "loadsmp.net"; // Die IP, die kopiert werden soll
            const box = document.getElementById("ipBox");
            
            // Text in die Zwischenablage kopieren
            navigator.clipboard.writeText(ipText).then(() => {
                // Style ändern zu "Kopiert"
                box.classList.add("copied");
                box.innerText = "Kopiert!";
                
                // Nach 2 Sekunden wieder zurücksetzen
                setTimeout(() => {
                    box.classList.remove("copied");
                    box.innerText = ipText;
                }, 2000);
            });
        }
    </script>

</body>
</html>
