<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0a0a12;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        .neon-box {
            border: 2px solid #ff0055;
            box-shadow: 0 0 15px #ff0055;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            max-width: 500px;
        }
        button {
            background: #000;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

    <h1>LOADTIERS HUB</h1>

    <div class="neon-box">
        <h2>Support mich</h2>
        <!-- Platzhalter für Zahlungsanbieter -->
        <button onclick="alert('Google Pay Integration via Stripe/PayPal erforderlich')">
            Spenden mit Google Pay
        </button>
    </div>

    <div class="neon-box">
        <h2>Minigame: Klick-Duell</h2>
        <p id="score">Score: 0</p>
        <button onclick="increaseScore()">Klick mich!</button>
    </div>

    <script>
        let score = 0;
        function increaseScore() {
            score++;
            document.getElementById('score').innerText = "Score: " + score;
        }
    </script>
</body>
</html>
