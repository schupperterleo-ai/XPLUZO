<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Format Prüfer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; max-width: 400px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { background: #38bdf8; color: #121212; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h3>Eingabe-Validierung</h3>
    <label>Telefonnummer prüfen:</label>
    <input type="text" id="phoneInput" placeholder="z.B. +49 170 1234567">
    <button onclick="checkFormat()">Format checken</button>
    <p id="result"></p>
</div>

<script>
function checkFormat() {
    const input = document.getElementById('phoneInput').value;
    const resultText = document.getElementById('result');
    
    // Prüft grob, ob die Nummer mit einem + startet und nur Zahlen/Leerzeichen enthält
    const regex = /^\+[0-9\s\-]+$/;
    
    if (regex.test(input)) {
        resultText.innerText = "✅ Gültiges internationales Format!";
        resultText.style.color = "lightgreen";
    } else {
        resultText.innerText = "❌ Ungültiges Format. Bitte mit Ländervorwahl (z.B. +49) eingeben.";
        resultText.style.color = "crimson";
    }
}
</script>

</body>
</html>
