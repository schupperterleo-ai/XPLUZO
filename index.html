<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Web-Clone (Vandal Test)</title>
  
  <!-- A-Frame für die 3D Ego-Perspektive -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }

    /* 2D HUD LAYER OVERLAY */
    #hud-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      font-family: 'Segoe UI', Impact, sans-serif;
      user-select: none;
    }

    /* Fadenkreuz (Crosshair) */
    .crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      transform: translate(-50%, -50%);
    }
    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: #00ffcc;
      box-shadow: 0 0 4px #00ffcc;
    }
    .crosshair::before { top: 3px; left: -3px; width: 14px; height: 2px; }
    .crosshair::after { left: 3px; top: -3px; width: 2px; height: 14px; }

    /* Valorant-Style HUD unten */
    .stats-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      align-items: flex-end;
    }
    .stat-box {
      background: rgba(10, 23, 36, 0.9);
      border: 2px solid #ff4655;
      padding: 8px 25px;
      color: #fff;
      text-align: center;
      min-width: 70px;
      box-shadow: 0 0 15px rgba(255, 70, 85, 0.2);
    }
    .hp-text { font-size: 36px; font-weight: bold; margin: 0; line-height: 1; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #7e8b96; margin-top: 4px; }
    
    .health-bar-wrapper {
      width: 220px;
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      margin-bottom: 6px;
      overflow: hidden;
      transform: skewX(-12deg);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .health-bar-fill { height: 100%; width: 100%; background: #fff; transition: width 0.1s; }

    /* Munitionsanzeige rechts unten */
    .ammo-box {
      position: absolute;
      bottom: 30px;
      right: 50px;
      background: rgba(10, 23, 36, 0.9);
      border: 2px solid #fff;
      padding: 10px 20px;
      color: #fff;
      transform: skewX(-12deg);
    }
    .ammo-text { font-size: 32px; font-weight: bold; margin: 0; }

    /* Kill Feed oben rechts */
    #kill-feed {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: flex-end;
    }
    .kill-item {
      background: rgba(255, 70, 85, 0.8);
      color: white;
      padding: 5px 15px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      border-left: 4px solid #fff;
      animation: fadeInOut 3s forwards;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(20px); }
      10% { opacity: 1; transform: translateX(0); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <!-- 1. 2D HUD (INTERFACE) -->
  <div id="hud-layer">
    <div class="crosshair"></div>
    <div id="kill-feed"></div>

    <div class="stats-container">
      <div class="stat-box" style="border-color: #00ffcc;">
        <p class="hp-text" style="color: #00ffcc;">50</p>
        <div class="stat-label">Schild</div>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="health-bar-wrapper"><div class="health-bar-fill" id="hp-bar"></div></div>
        <div class="stat-box"><p class="hp-text">100</p><div class="stat-label">Leben</div></div>
      </div>
    </div>

    <div class="ammo-box">
      <p class="ammo-text"><span id="ammo-clip">25</span><span style="color: #7e8b96; font-size: 18px;">/25</span></p>
    </div>
  </div>

  <!-- 2. 3D SPIELWELT -->
  <a-scene loading-screen="enabled: false" raycaster="objects: .target">
    
    <a-sky color="#060b10"></a-sky>
    <a-plane rotation="-90 0 0" width="100" height="100" color="#10151c"></a-plane>

    <!-- Eine "Range" / Test-Halle mit Wänden -->
    <a-box position="0 5 -20" width="30" height="10" depth="1" color="#1b222b"></a-box>
    <a-box position="-15 5 -10" width="1" height="10" depth="20" color="#161c24"></a-box>
    <a-box position="15 5 -10" width="1" height="10" depth="20" color="#161c24"></a-box>

    <!-- Boden-Markierungen für die Range -->
    <a-grid width="30" height="20" position="0 0.01 -10" color="#ff4655" opacity="0.2"></a-grid>

    <!-- DIE BOTS / ZIELE (Rote Kapseln wie in Valorant) -->
    <a-entity class="target" id="bot-1" geometry="primitive: capsule; radius: 0.4; length: 1.8" material="color: #ff4655" position="-3 1.2 -15"></a-entity>
    <a-entity class="target" id="bot-2" geometry="primitive: capsule; radius: 0.4; length: 1.8" material="color: #ff4655" position="0 1.2 -12"></a-entity>
    <a-entity class="target" id="bot-3" geometry="primitive: capsule; radius: 0.4; length: 1.8" material="color: #ff4655" position="4 1.2 -17"></a-entity>

    <!-- SPIELER-KAMERA + INTEGRATION DER WAFFE -->
    <a-entity camera look-controls wasd-controls position="0 1.6 0">
      
      <!-- DIE WAFFE (Rechts unten im Sichtfeld verankert) -->
      <a-entity id="weapon" position="0.3 -0.35 -0.6" rotation="0 95 0">
        <!-- Hauptlauf der Waffe -->
        <a-box width="0.7" height="0.08" depth="0.06" color="#22272e"></a-box>
        <!-- Magazin -->
        <a-box width="0.15" height="0.2" depth="0.05" position="-0.1 -0.12 0" rotation="0 0 15" color="#181c22"></a-box>
        <!-- Visier -->
        <a-box width="0.1" height="0.03" depth="0.02" position="0.1 0.05 0" color="#ff4655"></a-box>
        
        <!-- MÜNDUNGSFEUER (Standardmäßig unsichtbar, blitzt beim Schießen auf) -->
        <a-cone id="muzzle-flash" position="0.4 0 0" rotation="0 0 -90" radius-bottom="0.06" radius-top="0.01" height="0.2" color="#ffcc00" visible="false" material="shader: flat"></a-cone>
      </a-entity>

      <!-- Unsichtbarer Laser-Strahler exakt aus der Mitte des Bildschirms für Treffererkennung -->
      <a-entity id="raycaster" raycaster="objects: .target; showLine: false"></a-entity>

    </a-entity>

  </a-scene>

  <!-- 3. CODE FÜR DIE LOGIK (SCHIESSEN, TREFFEN, NACHLADEN) -->
  <script>
    let ammo = 25;
    let isReloading = false;
    const ammoClip = document.getElementById('ammo-clip');
    const muzzleFlash = document.getElementById('muzzle-flash');
    const raycasterEl = document.getElementById('raycaster');
    const killFeed = document.getElementById('kill-feed');
    const weapon = document.getElementById('weapon');

    // Synthetischer Soundeffekt für den Schuss (Web Audio API)
    function playShootSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    }

    // Linksklick zum Schießen
    window.addEventListener('mousedown', (e) => {
      if (e.button !== 0 || isReloading || ammo <= 0) return;

      // Munition abziehen
      ammo--;
      ammoClip.textContent = ammo;

      // Sound & Mündungsfeuer blitzen lassen
      playShootSound();
      muzzleFlash.setAttribute('visible', 'true');
      
      // Kleiner Waffen-Rückstoß (Animation)
      weapon.setAttribute('position', '0.3 -0.35 -0.55');

      setTimeout(() => {
        muzzleFlash.setAttribute('visible', 'false');
        weapon.setAttribute('position', '0.3 -0.35 -0.6');
      }, 50);

      // Treffereffekt prüfen (Raycast aus der Bildschirmmitte)
      const intersection = raycasterEl.components.raycaster.getIntersection(document.querySelector('.target'));
      
      if (intersection && intersection.element) {
        const hitBot = intersection.element;
        
        // Kill-Feed Nachricht erstellen
        const killMsg = document.createElement('div');
        killMsg.className = 'kill-item';
        killMsg.innerHTML = `Du <span style="color:#0a1724">➔</span> Bot (${hitBot.id})`;
        killFeed.appendChild(killMsg);
        setTimeout(() => killMsg.remove(), 3000);

        // Bot "killen" (Teleportiert ihn an eine neue zufällige Position wie auf der Range)
        hitBot.setAttribute('position', {
          x: (Math.random() - 0.5) * 12,
          y: 1.2,
          z: -10 - Math.random() * 8
        });
      }

      // Automatisches Nachladen, wenn leer
      if (ammo === 0) reload();
    });

    // R-Taste zum Nachladen
    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR' && ammo < 25) reload();
    });

    function reload() {
      if (isReloading) return;
      isReloading = true;
      ammoClip.textContent = "REC";
      
      // Nachlade-Waffenbewegung (Waffe senkt sich kurz)
      weapon.setAttribute('rotation', '20 95 0');

      setTimeout(() => {
        ammo = 25;
        ammoClip.textContent = ammo;
        weapon.setAttribute('rotation', '0 95 0');
        isReloading = false;
      }, 1500); // 1.5 Sekunden Nachladezeit
    }
  </script>
</body>
</html>
