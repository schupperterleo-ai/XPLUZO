<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Web Game</title>
    <style>
        /* GLOBALE VARIABLEN & CYBER-NEON COLOR SCHEME */
        :root {
            /* Das originale Button-Grün als Basis */
            --main-color: rgb(46, 213, 115);
            --main-bg-color: rgba(46, 213, 116, 0.2);
            --pattern-color: rgba(46, 213, 116, 0.08);
            
            /* HUE-ROTATE: 250deg bis 270deg macht aus dem Grün ein giftiges Valorant-Neon-Rot */
            --val-hue: hue-rotate(250deg);
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b141a; /* Tiefer, dunkler Valorant-Hintergrund */
            color: #ece8e1; /* Off-White für besseren Kontrast */
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* GEMEINSAME TEXTUR FÜR HINTERGRÜNDE (Abgeleitet von deinem Button-Code) */
        .cyber-grid-bg {
            filter: var(--val-hue);
            background: 
                radial-gradient(circle, var(--main-bg-color) 0%, rgba(0, 0, 0, 0.85) 95%),
                linear-gradient(var(--pattern-color) 1px, transparent 1px),
                linear-gradient(to right, var(--pattern-color) 1px, transparent 1px);
            background-size: cover, 25px 25px, 25px 25px;
            background-position: center;
        }

        /* SCREENS MANAGEMENT */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 1. LOGIN / STARTER SCREEN */
        #login-screen {
            gap: 2rem;
        }

        .login-card {
            background: rgba(11, 20, 26, 0.85);
            padding: 3rem;
            border: 1px solid rgba(46, 213, 115, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 350px;
        }

        .login-card h1 {
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--main-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            color: rgba(236, 232, 225, 0.6);
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(46, 213, 115, 0.3);
            padding: 0.8rem;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 0.05rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--main-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(46, 213, 115, 0.2);
        }

        /* 2. LOBBY SCREEN */
        #lobby-screen {
            justify-content: space-between;
            align-items: stretch;
            padding: 2rem 4rem;
        }

        /* Valorant Top-Bar */
        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(46, 213, 115, 0.2);
            padding-bottom: 1rem;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 0.4rem;
            color: var(--main-color);
        }

        .player-tag {
            font-size: 1.1rem;
            letter-spacing: 0.1rem;
            background: rgba(46, 213, 115, 0.1);
            padding: 0.5rem 1.5rem;
            border-left: 3px solid var(--main-color);
        }

        /* Hauptbereich der Lobby */
        .lobby-main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
        }

        /* Match-Suche Container im Zentrum */
        .matchmaking-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .game-mode {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            text-shadow: 0 0 20px rgba(46, 213, 115, 0.4);
        }

        /* DER ORIGINAL-BUTTON VON UIVERSE (leicht angepasst für Flexibilität) */
        .button {
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            background: radial-gradient(
                circle,
                var(--main-bg-color) 0%,
                rgba(0, 0, 0, 0) 95%
                ),
                linear-gradient(var(--pattern-color) 1px, transparent 1px),
                linear-gradient(to right, var(--pattern-color) 1px, transparent 1px);
            background-size: cover, 15px 15px, 15px 15px;
            background-position: center center, center center, center center;
            border-image: radial-gradient(
                circle,
                var(--main-color) 0%,
                rgba(0, 0, 0, 0) 100%
                ) 1;
            border-width: 1px 0 1px 0;
            color: var(--main-color);
            padding: 1.2rem 4rem;
            font-weight: 700;
            font-size: 1.5rem;
            transition: background-size 0.2s ease-in-out, transform 0.1s;
            outline: none;
        }

        .button:hover {
            background-size: cover, 10px 10px, 10px 10px;
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.15);
        }
        
        .button:active {
            transform: scale(0.98);
        }

        /* Matchmaking-Sucheffekt */
        .searching-text {
            display: none;
            font-size: 1.2rem;
            letter-spacing: 0.2rem;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN / STARTER SCREEN -->
    <div id="login-screen" class="screen cyber-grid-bg active">
        <div class="login-card">
            <h1>Riot Sign In</h1>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" autocomplete="off" placeholder="Dein Agenten-Name">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="button" type="button" onclick="login()">Sign In</button>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="lobby-screen" class="screen cyber-grid-bg">
        <!-- Top Bar -->
        <div class="lobby-header">
            <div class="logo">VALORANT_WEB</div>
            <div class="player-tag" id="display-name">AGENT#EUW</div>
        </div>

        <!-- Main Content -->
        <div class="lobby-main">
            <div class="matchmaking-box">
                <div class="game-mode">Unrated</div>
                
                <button class="button" id="play-btn" onclick="startMatchmaking()">Start Game</button>
                <div class="searching-text" id="search-status">Warten auf Mitspieler...</div>
            </div>
        </div>
    </div>

    <script>
        // Login Logik
        function login() {
            const nameInput = document.getElementById('username').value.trim();
            
            // Fallback, falls kein Name eingegeben wurde
            const username = nameInput ? nameInput.toUpperCase() : "AGENT";
            
            // Setze den Spielernamen in der Lobby
            document.getElementById('display-name').innerText = username + "#2026";
            
            // Wechsel den Screen
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('lobby-screen').classList.add('active');
        }

        // Matchmaking-Button Effekt
        let isSearching = false;
        function startMatchmaking() {
            const playBtn = document.getElementById('play-btn');
            const statusText = document.getElementById('search-status');

            if (!isSearching) {
                isSearching = true;
                playBtn.innerText = "Abbrechen";
                statusText.style.display = "block";
                
                // Hier könntest du später dein echtes Spiel starten lassen!
                console.log("Matchmaking gestartet...");
            } else {
                isSearching = false;
                playBtn.innerText = "Start Game";
                statusText.style.display = "none";
                console.log("Matchmaking abgebrochen.");
            }
        }
    </script>
</body>
</html>
