<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Launcher | The Ultimate Minecraft Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Dark & Neon Theme */
        :root {
            --primary: #00ff88; 
            --primary-glow: rgba(0, 255, 136, 0.4);
            --discord: #5865F2; 
            --discord-glow: rgba(88, 101, 242, 0.4);
            --store: #ff91a4; 
            --store-glow: rgba(255, 145, 164, 0.4);
            --bg-dark: #050505;
            --bg-surface: rgba(20, 20, 20, 0.55); 
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .background-animation {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 136, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 184, 255, 0.08), transparent 25%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) translate(20px, -20px); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .fade-in-section {
            opacity: 0; transform: translateY(40px); visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, visibility;
        }
        .fade-in-section.is-visible { opacity: 1; transform: none; visibility: visible; }

        header {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 20px; position: relative;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 800; margin-bottom: 15px;
            letter-spacing: -2px; animation: fadeInDown 1s ease-out;
            background: linear-gradient(135deg, #ffffff 0%, #00ff88 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
        }

        p.subtitle {
            font-size: 1.2rem; color: var(--text-muted); font-weight: 300;
            animation: fadeInDown 1.2s ease-out; max-width: 600px; line-height: 1.7; margin-bottom: 40px;
        }

        .hero-buttons {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
            animation: fadeInDown 1.4s ease-out, float 5s ease-in-out infinite;
        }

        .btn {
            padding: 16px 32px; font-size: 1rem; font-weight: 600;
            font-family: 'Poppins', sans-serif; color: var(--bg-dark);
            background-color: var(--primary); border: none; border-radius: 14px;
            cursor: pointer; text-decoration: none; transition: all 0.3s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 25px var(--primary-glow); }
        .btn-discord { background-color: var(--discord); color: white; }
        .btn-discord:hover { box-shadow: 0 10px 25px var(--discord-glow); }
        .btn-store { background-color: transparent; color: var(--store); border: 2px solid var(--store); }
        .btn-store:hover { background-color: var(--store); color: var(--bg-dark); box-shadow: 0 10px 25px var(--store-glow); }
        .btn.disabled { background-color: rgba(255, 255, 255, 0.05); color: #555; cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-mini-upload {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--bg-surface); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-muted);
            padding: 10px 15px; border-radius: 50px; font-size: 0.85rem;
            cursor: pointer; z-index: 100; transition: all 0.3s ease;
        }
        .btn-mini-upload:hover { background: rgba(255, 255, 255, 0.1); color: white; border-color: var(--primary); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg-surface); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px; border-radius: 28px; text-align: center; max-width: 420px;
            width: 90%; box-shadow: 0 40px 80px rgba(0,0,0,0.8); position: relative;
            animation: modalFadeIn 0.4s ease;
        }
        .modal-content.store-modal { max-width: 550px; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2rem; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: white; }
        .os-options { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .os-btn { padding: 18px; font-size: 1.05rem; width: 100%; box-sizing: border-box; }

        .upload-group { margin-top: 25px; text-align: left; }
        .upload-group label { display: block; font-size: 0.9rem; color: var(--primary); margin-bottom: 8px; font-weight: 600; }
        .file-input-wrapper { background: rgba(0,0,0,0.3); border: 1px dashed rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .file-input-wrapper input { color: var(--text-muted); width: 100%; }
        .upload-submit-btn { width: 100%; margin-top: 10px; }

        .store-item { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 20px; margin-top: 25px; }
        .store-item img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .store-item h4 { margin: 0 0 10px 0; font-size: 1.4rem; color: white; }
        .store-item .price { color: var(--store); font-weight: 800; font-size: 1.2rem; margin: 0 0 20px 0; }
        .store-item .btn-buy { width: 100%; background-color: var(--store); color: var(--bg-dark); }

        .features { padding: 80px 20px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .card { background: linear-gradient(145deg, rgba(30,30,30,0.6) 0%, rgba(20,20,20,0.4) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.03); padding: 40px 30px; border-radius: 24px; width: 320px; text-align: left; transition: all 0.4s ease; }
        .card:hover { transform: translateY(-10px); border-color: rgba(0, 255, 136, 0.3); }
        .card h3 { font-size: 1.4rem; margin-top: 0; color: #fff; font-weight: 600; }
        .card p { color: var(--text-muted); line-height: 1.7; font-size: 0.95rem; margin-bottom: 0; }
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); color: #444; margin-top: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="background-animation"></div>

    <button class="btn-mini-upload" onclick="openModal('uploadModal')">☁️ Upload Files</button>

    <header>
        <h1>Load Launcher</h1>
        <p class="subtitle">Your ultimate connection to LoadSMP, LoadPVP, and LoadTiers.</p>
        <div class="hero-buttons">
            <button onclick="openModal('downloadModal')" class="btn">📥 Download</button>
            <button onclick="openModal('cosmeticsModal')" class="btn btn-store">🌸 Cosmetics</button>
            <a href="https://discord.gg/cNkq2KxfPV" target="_blank" class="btn btn-discord">💬 Discord</a>
        </div>
    </header>

    <div id="downloadModal" class="modal-overlay" onclick="closeModalOutside(event, 'downloadModal')">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('downloadModal')">&times;</span>
            <h2>Choose Your OS</h2>
            <div class="os-options">
                <a href="Load Launcher Setup 1.0.0.exe" download class="btn os-btn">🪟 Windows (.exe)</a>
                <button class="btn os-btn disabled" disabled>🐧 Fedora / Ubuntu - Soon</button>
            </div>
        </div>
    </div>

    <div id="cosmeticsModal" class="modal-overlay" onclick="closeModalOutside(event, 'cosmeticsModal')">
        <div class="modal-content store-modal">
            <span class="close-btn" onclick="closeModal('cosmeticsModal')">&times;</span>
            <h2>Cosmetics Store</h2>
            <div class="store-item">
                <img src="image_2cfa58.png" alt="Sakura Cape Preview">
                <h4>Exclusive Sakura Cape</h4>
                <p class="price">🪙 500 Coins</p>
                <button class="btn btn-buy">Purchase Cape</button>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal-overlay" onclick="closeModalOutside(event, 'uploadModal')">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('uploadModal')">&times;</span>
            <h2>Cloud Upload (Firebase)</h2>
            <div class="upload-group">
                <label for="capeUpload">Upload Cape Preview (.png)</label>
                <div class="file-input-wrapper"><input type="file" id="capeUpload" accept="image/png, image/jpeg"></div>
                <label for="exeUpload">Upload Client Update (.exe)</label>
                <div class="file-input-wrapper"><input type="file" id="exeUpload" accept=".exe"></div>
                <button class="btn upload-submit-btn" onclick="handleRealUpload()">Upload to Cloud</button>
                <p id="uploadStatus" style="font-size: 0.85rem; margin-top: 10px; color: var(--primary); display: none;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase Core and Storage from Google CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // Deine exakte Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBswyuV0HblMDvmrh6McmPRb26Hz99XhAY",
            authDomain: "loadtiers.firebaseapp.com",
            projectId: "loadtiers",
            storageBucket: "loadtiers.firebasestorage.app",
            messagingSenderId: "705641531162",
            appId: "1:705641531162:web:c09e2227b0bff91ab5cea3",
            measurementId: "G-VXJ4YDKVP7"
        };

        // Firebase starten
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app); // Storage (für die Dateien) aktivieren

        // UI Funktionen für die Buttons an das 'window' Objekt heften, damit HTML sie findet
        window.openModal = function(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }
        window.closeModal = function(modalId) {
            document.getElementById(modalId).style.display = 'none';
            if(modalId === 'uploadModal') {
                document.getElementById('uploadStatus').style.display = 'none';
            }
        }
        window.closeModalOutside = function(event, modalId) {
            const modal = document.getElementById(modalId);
            if (event.target === modal) closeModal(modalId);
        }

        // --- HIER PASSIERT DER ECHTE UPLOAD ---
        window.handleRealUpload = async function() {
            const capeFile = document.getElementById('capeUpload').files[0];
            const exeFile = document.getElementById('exeUpload').files[0];
            const statusText = document.getElementById('uploadStatus');

            if(!capeFile && !exeFile) {
                statusText.style.color = "#ff4444";
                statusText.innerText = "Please select a file first.";
                statusText.style.display = "block";
                return;
            }

            statusText.style.color = "var(--primary)";
            statusText.innerText = "Uploading to Firebase Cloud... ⏳";
            statusText.style.display = "block";

            try {
                // Wenn ein Cape hochgeladen wird
                if (capeFile) {
                    const capeRef = ref(storage, 'capes/' + capeFile.name);
                    await uploadBytes(capeRef, capeFile);
                }
                // Wenn eine .exe hochgeladen wird
                if (exeFile) {
                    const exeRef = ref(storage, 'clients/' + exeFile.name);
                    await uploadBytes(exeRef, exeFile);
                }
                
                statusText.innerText = "✅ Upload successful! Files are in the cloud.";
            } catch (error) {
                console.error(error);
                statusText.style.color = "#ff4444";
                statusText.innerText = "❌ Error: Check Firebase Storage Rules.";
            }
        }

        // Scroll Animationen
        document.addEventListener("DOMContentLoaded", function() {
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) { entry.target.classList.add('is-visible'); obs.unobserve(entry.target); }
                });
            }, { threshold: 0.15 });
            document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
